server:
  port: 8081

spring:
  application:
    name: command-service

  datasource:
    url: jdbc:h2:mem:commanddb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

app:
  kafka:
    bootstrap-servers: localhost:9092
    topic:
      device-commands: device-commands